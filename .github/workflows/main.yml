name: Attendance CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4   # updated

    - name: Setup Python
      uses: actions/setup-python@v5   # updated
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Test
      run: echo "Project is working successfully!"